<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚礼邀请函 - 前端集成示例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #8B0000;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section h3 {
            color: #8B0000;
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 2px dashed #8B0000;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 0 5px rgba(139, 0, 0, 0.3);
        }

        .checkbox-group,
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-item,
        .radio-item {
            display: flex;
            align-items: center;
        }

        input[type="checkbox"],
        input[type="radio"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .checkbox-item label,
        .radio-item label {
            margin: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #8B0000 0%, #A00000 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            color: #8B0000;
            margin-top: 10px;
        }

        .loading.show {
            display: block;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .required {
            color: #8B0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>邀请函确认</h1>
        <form id="rsvpForm">
            <!-- 1. 选择参与的婚礼地点 -->
            <div class="form-section">
                <h3>1. 选择参与的婚礼地点 <span class="required">*</span></h3>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="location1" name="wedding_location" value="山西晋城 - 凤城国际康养中心 (05.01)" required>
                        <label for="location1">山西晋城 - 凤城国际康养中心 (05.01)</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="location2" name="wedding_location" value="山东诸城 - 蓝海大酒店 (05.04)" required>
                        <label for="location2">山东诸城 - 蓝海大酒店 (05.04)</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="location3" name="wedding_location" value="我都参加" required>
                        <label for="location3">我都参加</label>
                    </div>
                </div>
            </div>

            <!-- 2. 宾客信息 -->
            <div class="form-section">
                <h3>2. 宾客信息</h3>
                <div class="form-group">
                    <label for="guest_name">您的姓名 <span class="required">*</span></label>
                    <input type="text" id="guest_name" name="guest_name" placeholder="请输入您的姓名" required>
                </div>
                <div class="form-group">
                    <label for="guest_count">参与人数 <span class="required">*</span></label>
                    <input type="number" id="guest_count" name="guest_count" placeholder="请输入参与人数" min="1" required>
                </div>
                <div class="form-group">
                    <label for="accompanying_guests">参与亲友姓名</label>
                    <input type="text" id="accompanying_guests" name="accompanying_guests" placeholder="请输入随行人员姓名（可选）">
                </div>
            </div>

            <!-- 3. 住宿要求 -->
            <div class="form-section">
                <h3>3. 住宿要求 (多选)</h3>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="date1" name="accommodation_dates" value="4月30日 (晋城)">
                        <label for="date1">4月30日 (晋城)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="date2" name="accommodation_dates" value="5月1日 (晋城)">
                        <label for="date2">5月1日 (晋城)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="date3" name="accommodation_dates" value="5月3日 (诸城)">
                        <label for="date3">5月3日 (诸城)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="date4" name="accommodation_dates" value="5月4日 (诸城)">
                        <label for="date4">5月4日 (诸城)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="date5" name="accommodation_dates" value="不需提供住宿">
                        <label for="date5">不需提供住宿</label>
                    </div>
                </div>
            </div>

            <!-- 4. 房型要求 -->
            <div class="form-section">
                <h3>4. 房型要求 (单选)</h3>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="room1" name="room_type" value="大床房">
                        <label for="room1">大床房</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="room2" name="room_type" value="双床房">
                        <label for="room2">双床房</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="room3" name="room_type" value="不住宿">
                        <label for="room3">不住宿</label>
                    </div>
                </div>
            </div>

            <!-- 5. 晚间聚会 -->
            <div class="form-section">
                <h3>5. 是否有意愿参加晚间聚会 (After Party)</h3>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="party1" name="after_party" value="yes">
                        <label for="party1">参加</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="party2" name="after_party" value="no">
                        <label for="party2">不参加</label>
                    </div>
                </div>
            </div>

            <button type="submit">提交</button>
            <div class="loading" id="loading">提交中...</div>
            <div class="message" id="message"></div>
        </form>
    </div>

    <script>
        // 配置后端 URL（根据您的部署地址修改）
        const BACKEND_URL = 'http://localhost:3001'; // 本地开发
        // const BACKEND_URL = 'https://your-backend-domain.com'; // 生产环境

        const form = document.getElementById('rsvpForm');
        const loadingDiv = document.getElementById('loading');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // 显示加载状态
            loadingDiv.classList.add('show');
            messageDiv.classList.remove('show');

            try {
                // 收集表单数据
                const formData = new FormData(form);
                const data = {
                    wedding_location: formData.get('wedding_location'),
                    guest_name: formData.get('guest_name'),
                    guest_count: parseInt(formData.get('guest_count')),
                    accompanying_guests: formData.get('accompanying_guests'),
                    accommodation_dates: Array.from(formData.getAll('accommodation_dates')).join(', '),
                    room_type: formData.get('room_type'),
                    after_party: formData.get('after_party') === 'yes'
                };

                // 发送到后端
                const response = await fetch(`${BACKEND_URL}/api/rsvp/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                loadingDiv.classList.remove('show');

                if (result.success) {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.add('show', 'success');
                    form.reset();
                } else {
                    messageDiv.textContent = result.message || '提交失败，请重试';
                    messageDiv.classList.add('show', 'error');
                }
            } catch (error) {
                loadingDiv.classList.remove('show');
                messageDiv.textContent = '网络错误，请检查后端服务器是否运行';
                messageDiv.classList.add('show', 'error');
                console.error('提交错误:', error);
            }
        });
    </script>
</body>
</html>
